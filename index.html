<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日田なび | Hita City Concierge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f7fa', 100: '#e0eff5', 500: '#1b4353', 600: '#153644', accent: '#c89f5d' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; position: fixed; inset: 0; overflow: hidden; width: 100vw; }
        #map { position: absolute; inset: 0; z-index: 1; }
        
        #sidebar {
            position: fixed;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        @media (max-width: 767px) {
            #sidebar {
                bottom: 0; left: 0; right: 0;
                height: 85vh;
                transform: translateY(calc(85vh - 110px));
            }
            #sidebar.open { transform: translateY(0); }
            #sidebar.dragging { transition: none; }
            .leaflet-bottom.leaflet-right { bottom: 120px !important; }
        }

        @media (min-width: 768px) {
            #sidebar {
                top: 80px; left: 24px; bottom: 24px;
                width: 380px;
                height: auto;
                max-height: calc(100vh - 104px);
                transform: none !important;
            }
            #drawer-handle { display: none; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scroll { -webkit-overflow-scrolling: touch; overflow-y: auto; overflow-x: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <header class="fixed top-0 left-0 right-0 z-[150] px-4 py-3 md:py-6 pointer-events-none w-full">
        <div class="flex items-center justify-between w-full">
            <div class="flex items-center gap-2 bg-white/90 backdrop-blur-md px-3 py-2 rounded-2xl shadow-xl border border-white/50 pointer-events-auto max-w-[80%] overflow-hidden">
                <div class="bg-brand-500 text-white w-8 h-8 rounded-lg flex-none flex items-center justify-center shadow-lg">
                    <i class="fas fa-map-marked-alt text-sm"></i>
                </div>
                <div class="truncate">
                    <div class="flex items-baseline gap-1">
                        <h1 class="text-brand-500 font-black text-sm md:text-lg leading-none">日田なび</h1>
                        <span id="header-credit" class="text-[7px] md:text-[9px] text-slate-500 font-bold opacity-80 truncate">created by 大分県立日田高校 79回生 SS情報班</span>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-2 pointer-events-auto">
                <select id="lang-select" class="bg-white/90 backdrop-blur-md text-slate-600 text-[10px] font-bold px-2 py-2 rounded-xl shadow-xl border border-white/50 outline-none">
                    <option value="ja">JA</option><option value="en">EN</option><option value="zh">ZH</option><option value="ko">KO</option>
                </select>
                <button id="gps-btn" class="bg-white/90 backdrop-blur-md text-slate-600 w-10 h-10 rounded-xl shadow-xl border border-white/50 flex items-center justify-center active:scale-90">
                    <i class="fas fa-location-arrow text-sm"></i>
                </button>
            </div>
        </div>
    </header>

    <div id="map"></div>

    <aside id="sidebar" class="pointer-events-none">
        <div id="drawer-handle" class="w-full flex justify-center p-3 pointer-events-auto cursor-ns-resize">
            <div class="w-12 h-1 bg-slate-400/30 rounded-full"></div>
        </div>

        <div class="bg-white/95 backdrop-blur-xl md:rounded-[24px] rounded-t-[32px] shadow-2xl border border-white/20 flex-1 flex flex-col overflow-hidden pointer-events-auto mx-0">
            
            <!-- Tabs & Switcher are constrained to full width minus padding -->
            <div class="flex-none w-full bg-slate-100/50 p-3">
                <div class="grid grid-cols-2 gap-2 text-center">
                    <label class="cursor-pointer">
                        <input type="radio" name="mode" value="tourism" class="hidden peer" checked>
                        <div id="mode-label-tourism" class="py-2 rounded-xl text-[10px] font-black border-2 border-transparent peer-checked:border-brand-500 peer-checked:bg-brand-500 peer-checked:text-white text-slate-400 bg-white shadow-sm transition-all uppercase">Tourism</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="mode" value="disaster" class="hidden peer">
                        <div id="mode-label-disaster" class="py-2 rounded-xl text-[10px] font-black border-2 border-transparent peer-checked:border-red-600 peer-checked:bg-red-600 peer-checked:text-white text-slate-400 bg-white shadow-sm transition-all uppercase">Disaster</div>
                    </label>
                </div>
            </div>

            <div class="flex border-b border-slate-100 bg-white flex-none w-full">
                <button id="tab-btn-list" data-tab="list" class="flex-1 py-3 text-[10px] font-black text-brand-500 border-b-2 border-brand-500 transition-all uppercase">Find</button>
                <button id="tab-btn-info" data-tab="info" class="flex-1 py-3 text-[10px] font-black text-slate-400 border-b-2 border-transparent transition-all uppercase px-1 truncate">Route</button>
                <button id="tab-btn-extra" data-tab="extra" class="flex-1 py-3 text-[10px] font-black text-slate-400 border-b-2 border-transparent transition-all uppercase px-1">Info</button>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden w-full">
                <div id="search-section" class="p-4 bg-white border-b border-slate-50 space-y-3 flex-none w-full box-border">
                    <div class="relative w-full">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input type="text" id="search-input" class="w-full pl-11 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm outline-none focus:ring-2 focus:ring-brand-500" placeholder="Search...">
                    </div>
                    <div id="category-chips" class="flex gap-2 overflow-x-auto pb-1 no-scrollbar custom-scroll w-full"></div>
                    <div class="flex items-center justify-between gap-2 pt-1 w-full overflow-hidden">
                        <div id="selected-count" class="text-[8px] font-black text-brand-500 bg-brand-50 px-2 py-1.5 rounded-lg border border-brand-100 flex-none truncate">0SEL</div>
                        <button id="optimize-btn" class="flex-1 bg-brand-500 text-white py-2.5 rounded-xl text-[10px] font-black shadow-lg uppercase truncate">最適化ルートの算出</button>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto custom-scroll p-4 space-y-4 w-full box-border" id="sidebar-scroll-area">
                    <div id="pane-list" class="space-y-3 w-full">
                        <div id="spot-list" class="space-y-3 w-full"></div>
                    </div>

                    <div id="pane-info" class="hidden space-y-6 pb-10 w-full">
                        <div id="route-info" class="hidden bg-brand-50 p-5 rounded-[32px] border border-brand-100 shadow-sm space-y-4 w-full box-border">
                            <h3 class="text-brand-500 font-black text-sm flex items-center gap-2"><i class="fas fa-route"></i><span id="route-title-text">Route</span></h3>
                            <div id="route-stats" class="text-[11px] text-slate-600 space-y-2 w-full overflow-hidden"></div>
                            <div class="grid grid-cols-2 gap-2 w-full">
                                <button id="add-more-btn" class="bg-white text-brand-500 border border-brand-100 py-3 rounded-2xl text-[10px] font-bold">Add</button>
                                <button id="reset-route-btn" class="bg-white text-red-500 border border-red-50 py-3 rounded-2xl text-[10px] font-bold">Reset</button>
                            </div>
                            <button id="gmaps-link-btn" class="w-full bg-green-600 text-white py-4 rounded-[20px] text-sm font-black shadow-lg">Google Maps</button>
                        </div>
                        <section class="bg-slate-50 p-5 rounded-[32px] border border-slate-100 space-y-4 w-full box-border">
                            <h3 id="ai-title-text" class="text-slate-700 font-bold text-sm truncate">AI Guide</h3>
                            <input type="password" id="gemini-key" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm outline-none" placeholder="API Key">
                            <div class="grid grid-cols-2 gap-2 w-full">
                                <input type="text" id="ai-input-1" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm" placeholder="...">
                                <input type="text" id="ai-input-2" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm" placeholder="...">
                            </div>
                            <div id="ai-interests" class="flex flex-wrap gap-2 w-full"></div>
                            <textarea id="ai-request" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm h-24 resize-none outline-none" placeholder="..."></textarea>
                            <button id="ai-btn" class="w-full bg-brand-accent text-white py-4 rounded-[20px] text-sm font-black shadow-lg uppercase">Plan</button>
                            <div id="ai-response" class="hidden text-xs leading-relaxed bg-white p-5 rounded-3xl border border-slate-100 max-h-80 overflow-y-auto w-full box-border"></div>
                        </section>
                    </div>

                    <div id="pane-extra" class="hidden space-y-4 pb-10 w-full"><div id="extra-content-list" class="space-y-4 w-full"></div></div>
                </div>
            </div>

            <div class="p-4 bg-white border-t border-slate-50 text-center flex-none w-full box-border">
                <button id="clear-btn" class="text-[9px] font-black text-slate-300 hover:text-red-500 uppercase tracking-[0.2em] w-full">Selection Reset</button>
            </div>
        </div>
    </aside>

    <div id="detail-modal" class="fixed inset-0 z-[300] flex items-center justify-center px-4 hidden w-full h-full box-border">
        <div id="modal-overlay" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="bg-white w-full max-w-sm rounded-[40px] shadow-2xl overflow-hidden relative transform transition-all p-6 flex flex-col max-h-[85vh] box-border">
            <div class="flex justify-between items-start mb-4 flex-none w-full">
                <h3 id="detail-title" class="text-brand-500 font-black text-lg leading-tight truncate pr-2"></h3>
                <button id="close-modal" class="w-9 h-9 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center flex-none"><i class="fas fa-times"></i></button>
            </div>
            <div class="bg-slate-50 p-4 rounded-2xl mb-6 overflow-y-auto flex-1 custom-scroll w-full box-border">
                <p id="detail-desc" class="text-xs text-slate-600 leading-relaxed font-medium"></p>
            </div>
            <button id="modal-select-btn" class="w-full py-4 rounded-[20px] text-sm font-black text-white shadow-xl flex-none"></button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
