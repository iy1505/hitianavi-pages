<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日田なび | 観光・防災マップ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f7fa', 100: '#e0eff5', 500: '#1b4353', 600: '#153644', accent: '#c89f5d' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; position: fixed; inset: 0; overflow: hidden; }
        #map { position: absolute; inset: 0; z-index: 1; }
        
        /* レスポンシブ・サイドバー/ボトムシート */
        #sidebar {
            position: fixed;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* モバイル (スマホ) */
        @media (max-width: 767px) {
            #sidebar {
                bottom: 0; left: 0; right: 0;
                height: 85vh;
                transform: translateY(calc(85vh - 110px));
                width: 100%;
            }
            #sidebar.open { transform: translateY(0); }
            #sidebar.dragging { transition: none; }
            .leaflet-bottom.leaflet-left { bottom: 120px !important; transition: all 0.4s; }
            #sidebar.open ~ .leaflet-control-container .leaflet-bottom.leaflet-left { bottom: 86vh !important; }
        }

        /* タブレット・PC */
        @media (min-width: 768px) {
            #sidebar {
                top: 80px; left: 20px; bottom: 20px;
                width: 360px;
                height: auto;
                transform: none !important;
            }
            #drawer-handle { display: none; }
        }

        /* PC (ワイド) */
        @media (min-width: 1280px) {
            #sidebar { width: 400px; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

    <!-- Header: 全デバイスで上部に固定 -->
    <header class="fixed top-0 left-0 right-0 z-[150] bg-white/80 backdrop-blur-md border-b border-slate-100 px-4 py-3 md:py-4 md:bg-transparent md:border-none pointer-events-none">
        <div class="max-w-7xl mx-auto flex items-center justify-between pointer-events-auto">
            <div class="flex items-center gap-2 bg-white md:shadow-lg md:px-4 md:py-2 md:rounded-2xl border border-slate-50 md:border-white/50">
                <div class="bg-brand-500 text-white w-8 h-8 md:w-10 md:h-10 rounded-xl flex items-center justify-center shadow-md">
                    <i class="fas fa-map-marked-alt text-sm md:text-base"></i>
                </div>
                <div>
                    <h1 class="text-brand-500 font-bold text-sm md:text-lg leading-none">日田なび</h1>
                    <p class="hidden sm:block text-[8px] md:text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Hita City Concierge</p>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button id="gps-btn" class="bg-white text-slate-600 w-10 h-10 md:w-12 md:h-12 rounded-full shadow-lg flex items-center justify-center hover:bg-brand-500 hover:text-white transition-all active:scale-90">
                    <i class="fas fa-location-arrow"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Map -->
    <div id="map"></div>

    <!-- Responsive Sidebar / Bottom Sheet -->
    <aside id="sidebar" class="flex flex-col pointer-events-none">
        <!-- Handle (Mobile Only) -->
        <div id="drawer-handle" class="w-full flex justify-center p-3 pointer-events-auto cursor-grab active:cursor-grabbing">
            <div class="w-12 h-1.5 bg-slate-400/40 rounded-full"></div>
        </div>

        <!-- Content Area -->
        <div class="bg-white/95 backdrop-blur-xl md:rounded-[32px] rounded-t-[32px] shadow-2xl border border-white/20 flex-1 flex flex-col overflow-hidden pointer-events-auto">
            
            <!-- Mode Selector -->
            <div class="p-3 grid grid-cols-2 gap-2 bg-slate-50/50">
                <label class="cursor-pointer">
                    <input type="radio" name="mode" value="tourism" class="hidden peer" checked>
                    <div class="py-2.5 rounded-xl text-center text-xs font-bold border-2 border-transparent peer-checked:border-brand-500 peer-checked:bg-brand-500 peer-checked:text-white text-slate-500 bg-white shadow-sm transition-all">観光モード</div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="mode" value="disaster" class="hidden peer">
                    <div class="py-2.5 rounded-xl text-center text-xs font-bold border-2 border-transparent peer-checked:border-red-600 peer-checked:bg-red-600 peer-checked:text-white text-slate-500 bg-white shadow-sm transition-all">防災モード</div>
                </label>
            </div>

            <!-- Tabs: Text sizes optimized for mobile -->
            <div class="flex border-b border-slate-100 bg-white">
                <button id="tab-btn-list" data-tab="list" class="flex-1 py-3 text-[11px] md:text-xs font-bold text-brand-500 border-b-2 border-brand-500 transition-all">場所をさがす</button>
                <button id="tab-btn-info" data-tab="info" class="flex-1 py-3 text-[11px] md:text-xs font-bold text-slate-400 border-b-2 border-transparent transition-all truncate px-1">決定ルート・AI</button>
                <button id="tab-btn-extra" data-tab="extra" class="flex-1 py-3 text-[11px] md:text-xs font-bold text-slate-400 border-b-2 border-transparent transition-all">情報</button>
            </div>

            <!-- Sticky Search Area -->
            <div class="p-4 bg-white border-b border-slate-50 space-y-3">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                    <input type="text" id="search-input" class="w-full pl-10 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm outline-none focus:ring-2 focus:ring-brand-500" placeholder="キーワードで検索...">
                </div>
                <div id="category-chips" class="flex gap-2 overflow-x-auto pb-1 no-scrollbar custom-scroll"></div>
                <div class="flex items-center justify-between gap-3 pt-1">
                    <div id="selected-count" class="text-[9px] font-black text-brand-500 bg-brand-50 px-2.5 py-1 rounded-lg">0 か所選択中</div>
                    <button id="optimize-btn" class="flex-1 bg-brand-500 text-white py-2.5 rounded-xl text-xs font-bold shadow-lg shadow-brand-500/20 hover:bg-brand-600 active:scale-95 transition-all">ルートを決定する</button>
                </div>
            </div>

            <!-- Scrollable Content -->
            <div class="flex-1 overflow-y-auto custom-scroll p-4 space-y-4" id="tab-content-container">
                <div id="pane-list" class="space-y-3">
                    <div id="spot-list" class="space-y-3"></div>
                </div>

                <div id="pane-info" class="hidden space-y-6 pb-10">
                    <div id="route-info" class="hidden bg-brand-50 p-5 rounded-[32px] border border-brand-100 shadow-sm space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="text-brand-500 font-black text-sm">決定したルート</h3>
                            <span class="bg-white px-2 py-1 rounded-lg text-[9px] font-bold text-slate-400 border border-slate-100 uppercase">Route</span>
                        </div>
                        <div id="route-stats" class="text-xs text-slate-600 space-y-2"></div>
                        <div class="grid grid-cols-2 gap-2">
                            <button id="add-more-btn" class="bg-white text-brand-500 border border-brand-100 py-3 rounded-2xl text-[10px] font-bold">場所を追加</button>
                            <button id="reset-route-btn" class="bg-white text-red-500 border border-red-50 py-3 rounded-2xl text-[10px] font-bold">リセット</button>
                        </div>
                        <button id="gmaps-link-btn" class="w-full bg-green-600 text-white py-4 rounded-[20px] text-sm font-black shadow-lg shadow-green-600/20 active:scale-[0.98] transition-all">
                            <i class="fab fa-google mr-2 text-lg"></i>Googleマップで出発
                        </button>
                    </div>

                    <section class="bg-slate-50 p-5 rounded-[32px] border border-slate-100">
                        <h3 id="ai-title-text" class="text-slate-700 font-bold text-sm mb-4">AI観光ガイド</h3>
                        <div class="space-y-4">
                            <input type="password" id="gemini-key" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm" placeholder="Gemini API Key">
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" id="ai-input-1" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm" placeholder="滞在時間">
                                <input type="text" id="ai-input-2" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm" placeholder="予算">
                            </div>
                            <div id="ai-interests" class="flex flex-wrap gap-2"></div>
                            <textarea id="ai-request" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm h-24 resize-none" placeholder="その他の要望"></textarea>
                            <button id="ai-btn" class="w-full bg-brand-accent text-white py-4 rounded-[20px] text-sm font-black shadow-lg">AIプランを作成</button>
                            <div id="ai-response" class="hidden text-xs leading-relaxed bg-white p-5 rounded-3xl border border-slate-100 max-h-80 overflow-y-auto"></div>
                        </div>
                    </section>
                </div>

                <div id="pane-extra" class="hidden space-y-4 pb-10">
                    <div id="extra-content-list" class="space-y-4"></div>
                </div>
            </div>

            <!-- Selection Reset Footer -->
            <div class="p-4 bg-white border-t border-slate-50 text-center">
                <button id="clear-btn" class="text-[10px] font-black text-slate-300 hover:text-red-500 uppercase tracking-widest transition-all">SELECT RESET</button>
            </div>
        </div>
    </aside>

    <!-- Detailed Modal: High Z-Index -->
    <div id="detail-modal" class="fixed inset-0 z-[300] flex items-center justify-center px-6 hidden">
        <div id="modal-overlay" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="bg-white w-full max-w-sm rounded-[40px] shadow-2xl overflow-hidden relative transform transition-all p-8 flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-start mb-4">
                <h3 id="detail-title" class="text-brand-500 font-black text-xl leading-tight"></h3>
                <button id="close-modal" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center flex-none ml-2"><i class="fas fa-times"></i></button>
            </div>
            <div class="bg-slate-50 p-5 rounded-3xl mb-8 overflow-y-auto flex-1 custom-scroll">
                <p id="detail-desc" class="text-sm text-slate-600 leading-relaxed font-medium"></p>
            </div>
            <button id="modal-select-btn" class="w-full py-4 rounded-[20px] text-sm font-black text-white shadow-xl transition-all active:scale-95 flex-none"></button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
