<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日田なび | 観光・防災コンシェルジュ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f7fa', 100: '#e0eff5', 500: '#1b4353', 600: '#153644', accent: '#c89f5d' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; position: fixed; inset: 0; overflow: hidden; }
        #map { position: absolute; inset: 0; z-index: 1; }
        
        #sidebar {
            position: fixed;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* モバイル: 下からスワイプ */
        @media (max-width: 767px) {
            #sidebar {
                bottom: 0; left: 0; right: 0;
                height: 85vh;
                transform: translateY(calc(85vh - 110px));
                width: 100%;
            }
            #sidebar.open { transform: translateY(0); }
            #sidebar.dragging { transition: none; }
            .leaflet-bottom.leaflet-right { bottom: 120px !important; }
        }

        /* PC/タブレット: 左サイドバー */
        @media (min-width: 768px) {
            #sidebar {
                top: 80px; left: 24px; bottom: 24px;
                width: 380px;
                height: auto;
                transform: none !important;
            }
            #drawer-handle { display: none; }
            #sidebar .bg-white\/95 { border-radius: 24px !important; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scroll { -webkit-overflow-scrolling: touch; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-[150] px-4 py-3 md:py-6 pointer-events-none">
        <div class="max-w-full mx-auto flex items-center justify-between">
            <!-- Logo Card -->
            <div class="flex items-center gap-3 bg-white/90 backdrop-blur-md px-4 py-2 md:px-5 md:py-3 rounded-2xl shadow-xl border border-white/50 pointer-events-auto">
                <div class="bg-brand-500 text-white w-9 h-9 md:w-11 md:h-11 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-map-marked-alt text-lg md:text-xl"></i>
                </div>
                <div>
                    <h1 class="text-brand-500 font-black text-base md:text-xl leading-none">日田なび</h1>
                    <p class="text-[9px] md:text-[11px] text-slate-400 font-bold uppercase tracking-wider mt-0.5">Concierge Map</p>
                </div>
            </div>
            
            <!-- GPS Button -->
            <button id="gps-btn" class="bg-white/90 backdrop-blur-md text-slate-600 w-11 h-11 md:w-14 md:h-14 rounded-full shadow-xl border border-white/50 flex items-center justify-center hover:bg-brand-500 hover:text-white transition-all active:scale-90 pointer-events-auto">
                <i class="fas fa-location-arrow md:text-lg"></i>
            </button>
        </div>
    </header>

    <div id="map"></div>

    <aside id="sidebar" class="flex flex-col pointer-events-none">
        <div id="drawer-handle" class="w-full flex justify-center p-3 pointer-events-auto cursor-ns-resize">
            <div class="w-14 h-1.5 bg-slate-400/30 rounded-full shadow-inner"></div>
        </div>

        <div class="bg-white/95 backdrop-blur-xl rounded-t-[32px] shadow-2xl border border-white/20 flex-1 flex flex-col overflow-hidden pointer-events-auto">
            
            <!-- Mode Switcher -->
            <div class="p-4 grid grid-cols-2 gap-2 bg-slate-100/50">
                <label class="cursor-pointer">
                    <input type="radio" name="mode" value="tourism" class="hidden peer" checked>
                    <div class="py-2.5 rounded-xl text-center text-xs font-black border-2 border-transparent peer-checked:border-brand-500 peer-checked:bg-brand-500 peer-checked:text-white text-slate-400 bg-white shadow-sm transition-all uppercase tracking-wider">観光</div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="mode" value="disaster" class="hidden peer">
                    <div class="py-2.5 rounded-xl text-center text-xs font-black border-2 border-transparent peer-checked:border-red-600 peer-checked:bg-red-600 peer-checked:text-white text-slate-400 bg-white shadow-sm transition-all uppercase tracking-wider">防災</div>
                </label>
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-slate-100 bg-white">
                <button id="tab-btn-list" data-tab="list" class="flex-1 py-4 text-[11px] md:text-xs font-black text-brand-500 border-b-2 border-brand-500 transition-all uppercase">Find</button>
                <button id="tab-btn-info" data-tab="info" class="flex-1 py-4 text-[11px] md:text-xs font-black text-slate-400 border-b-2 border-transparent transition-all uppercase px-1 truncate">Route/AI</button>
                <button id="tab-btn-extra" data-tab="extra" class="flex-1 py-4 text-[11px] md:text-xs font-black text-slate-400 border-b-2 border-transparent transition-all uppercase px-1">Info</button>
            </div>

            <!-- Scrollable Content -->
            <div class="flex-1 overflow-y-auto custom-scroll flex flex-col" id="sidebar-scroll-area">
                
                <!-- Search (Only in List tab) -->
                <div id="search-section" class="p-4 bg-white space-y-3 sticky top-0 z-10 border-b border-slate-50">
                    <div class="relative">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input type="text" id="search-input" class="w-full pl-11 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm outline-none focus:ring-2 focus:ring-brand-500" placeholder="キーワードで検索...">
                    </div>
                    <div id="category-chips" class="flex gap-2 overflow-x-auto pb-1 no-scrollbar custom-scroll"></div>
                    <div class="flex items-center justify-between gap-3 pt-1">
                        <div id="selected-count" class="text-[9px] font-black text-brand-500 bg-brand-50 px-3 py-1.5 rounded-lg border border-brand-100">0SELECTED</div>
                        <button id="optimize-btn" class="flex-1 bg-brand-500 text-white py-2.5 rounded-xl text-xs font-bold shadow-lg shadow-brand-500/20 hover:bg-brand-600 transition-all">ルートを決定</button>
                    </div>
                </div>

                <div class="p-4 space-y-4">
                    <div id="pane-list" class="space-y-3">
                        <div id="spot-list" class="space-y-3"></div>
                    </div>

                    <div id="pane-info" class="hidden space-y-6">
                        <div id="route-info" class="hidden bg-brand-50 p-5 rounded-[32px] border border-brand-100 shadow-sm space-y-4">
                            <h3 class="text-brand-500 font-black text-sm flex items-center gap-2"><i class="fas fa-route"></i>決定ルート</h3>
                            <div id="route-stats" class="text-xs text-slate-600 space-y-2"></div>
                            <div class="grid grid-cols-2 gap-2">
                                <button id="add-more-btn" class="bg-white text-brand-500 border border-brand-100 py-3 rounded-2xl text-[10px] font-bold">場所を追加</button>
                                <button id="reset-route-btn" class="bg-white text-red-500 border border-red-50 py-3 rounded-2xl text-[10px] font-bold">リセット</button>
                            </div>
                            <button id="gmaps-link-btn" class="w-full bg-green-600 text-white py-4 rounded-[20px] text-sm font-black shadow-lg">Googleマップで案内</button>
                        </div>

                        <section class="bg-slate-50 p-5 rounded-[32px] border border-slate-100 space-y-4">
                            <h3 id="ai-title-text" class="text-slate-700 font-bold text-sm">AI観光ガイド</h3>
                            <input type="password" id="gemini-key" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-brand-500" placeholder="Gemini API Key">
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" id="ai-input-1" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm" placeholder="時間">
                                <input type="text" id="ai-input-2" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm" placeholder="予算">
                            </div>
                            <div id="ai-interests" class="flex flex-wrap gap-2"></div>
                            <textarea id="ai-request" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm h-24 resize-none outline-none focus:ring-2 focus:ring-brand-500" placeholder="その他の要望"></textarea>
                            <button id="ai-btn" class="w-full bg-brand-accent text-white py-4 rounded-[20px] text-sm font-black shadow-lg">プランを作成</button>
                            <div id="ai-response" class="hidden text-xs leading-relaxed bg-white p-5 rounded-3xl border border-slate-100 max-h-80 overflow-y-auto"></div>
                        </section>
                    </div>

                    <div id="pane-extra" class="hidden space-y-4">
                        <div id="extra-content-list" class="space-y-4"></div>
                    </div>
                </div>
            </div>

            <!-- Global Footer -->
            <div class="p-4 bg-white border-t border-slate-50 text-center flex-none">
                <button id="clear-btn" class="text-[9px] font-black text-slate-300 hover:text-red-500 uppercase tracking-[0.3em] transition-all active:scale-95">Selection Reset</button>
            </div>
        </div>
    </aside>

    <!-- Modal -->
    <div id="detail-modal" class="fixed inset-0 z-[300] flex items-center justify-center px-6 hidden">
        <div id="modal-overlay" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="bg-white w-full max-w-sm rounded-[40px] shadow-2xl overflow-hidden relative transform transition-all p-8 flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-start mb-4 flex-none">
                <h3 id="detail-title" class="text-brand-500 font-black text-xl leading-tight"></h3>
                <button id="close-modal" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center ml-2"><i class="fas fa-times"></i></button>
            </div>
            <div class="bg-slate-50 p-5 rounded-3xl mb-8 overflow-y-auto flex-1 custom-scroll">
                <p id="detail-desc" class="text-sm text-slate-600 leading-relaxed font-medium"></p>
            </div>
            <button id="modal-select-btn" class="w-full py-4 rounded-[20px] text-sm font-black text-white shadow-xl transition-all active:scale-95 flex-none"></button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
